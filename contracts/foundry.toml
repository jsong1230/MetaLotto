[profile.default]
src = "src"
out = "out"
libs = ["../lib"]
test = "test"
script = "script"
cache_path = "../cache"

# Solidity 설정
solc_version = "0.8.19"
evm_version = "london"
optimizer = true
optimizer_runs = 1000
via_ir = true

# 테스트 설정
verbosity = 3
fuzz = { runs = 256 }

# Gas 리포트
gas_reports = ["MetaLotto"]

# 포맷팅
[profile.default.fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

# Metadium 네트워크 RPC URL (배포용)
[rpc_endpoints]
metadium_mainnet = "${METADIUM_RPC_URL:-https://api.metadium.com/prod}"
metadium_testnet = "${METADIUM_TESTNET_RPC_URL:-https://api.metadium.com/dev}"
anvil = "http://localhost:8545"

# Etherscan 검증 (Metadium Explorer 지원)
[etherscan]
metadium_mainnet = { key = "${METADIUM_API_KEY:-}", url = "https://explorer.metadium.com/api" }
metadium_testnet = { key = "${METADIUM_API_KEY:-}", url = "https://testnetexplorer.metadium.com/api" }
